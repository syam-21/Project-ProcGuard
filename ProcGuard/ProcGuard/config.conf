# Configuration for ProcGuard
# Thresholds for resource usage (in %)
CPU_THRESHOLD=80
RAM_THRESHOLD=80

# Project Base Directory
PROJECT_ROOT="/home/siyam/Desktop/ProcGuard3/ProcGuard/ProcGuard"

# Log file path
LOG_FILE="$PROJECT_ROOT/logs/procguard.log"
LOG_MAX_SIZE=5242880 # 5MB in bytes

# Report file path
REPORT_FILE="$PROJECT_ROOT/reports/performance_summary.txt"

# List of critical processes to not kill (comma-separated)
CRITICAL_PROCESSES="systemd,init,kernel,sshd,dbus-daemon,NetworkManager,gnome-shell,Xorg,kthreadd,migration,rcu_sched,watchdog,kworker,flask,python3,bash,sh"

# List of processes to watch for instant detection (comma-separated)
WATCHED_PROCESSES="vlc,chrome,firefox,code,spotify"

# --- Auto-Optimization Mode Settings ---
AUTO_OPTIMIZE=true
# Threshold for a process to be considered "heavy idle" (using resources while not active)
IDLE_OPTIMIZE_CPU=10.0
IDLE_OPTIMIZE_RAM=5.0
# How often to run optimization check (in seconds)
OPTIMIZE_INTERVAL=30
